  apiVersion: batch/v1
  kind: Job
  metadata:
    name: argo-rce-poc
    namespace: argo-rce-poc
  spec:
    template:
      spec:
        restartPolicy: Never
        containers:
          - name: poc
            image: busybox:1.36
            command:
              - sh
              - -c
              - |
                echo "ARGO CD RCE POC - authorized test"
                id
                uname -a
                date
                sleep 30
